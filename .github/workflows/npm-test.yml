name: npm test

on:
  pull_request:
    branches:
      - main
      - modularisierung/projektverwaltung
  push:
    branches:
      - main
      - modularisierung/projektverwaltung

jobs:
  test:
    name: Run npm test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
